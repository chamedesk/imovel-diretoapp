{% extends 'base.html' %}
{% block content %}
<div class="card form-card">
  <h1>Novo filtro</h1>
  <form id="filter-form" class="stack">
    <label>Nome<input name="name" required></label>
    <label>Cidade<input name="city" placeholder="São Paulo"></label>
    <label>Bairros (separados por vírgula)<input name="neighborhoods" placeholder="Mooca, Tatuapé"></label>
    <label>Tipo do imóvel<input name="property_type" placeholder="apartamento"></label>
    <label>Preço mínimo<input type="number" step="0.01" name="min_price"></label>
    <label>Preço máximo<input type="number" step="0.01" name="max_price"></label>
    <label>Palavras-chave (vírgula)<input name="keywords" placeholder="sem corretor, proprietário"></label>
    <label class="inline"><input type="checkbox" name="owner_only" checked> Somente evitar provável corretor</label>
    <button type="submit">Salvar filtro</button>
  </form>
  <pre id="result-box" class="result-box"></pre>
</div>
<script src="/static/js/filter-form.js"></script>
{% endblock %}
